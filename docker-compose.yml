services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatinsight-pg
    environment:
      POSTGRES_USER: chatinsight
      POSTGRES_PASSWORD: chatinsight
      POSTGRES_DB: chatinsight
    ports:
      - "5432:5432"
    volumes:
      - chatinsight_pgdata:/var/lib/postgresql/data

volumes:
  chatinsight_pgdata:
