services:
  postgres:
    image: postgres:16
    container_name: chatinsight-pg
    environment:
      POSTGRES_USER: chatinsight
      POSTGRES_PASSWORD: chatinsight
      POSTGRES_DB: chatinsight
    ports:
      - "5432:5432"
    volumes:
      - chatinsight-pgdata:/var/lib/postgresql/data

volumes:
  chatinsight-pgdata:
